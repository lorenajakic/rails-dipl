name: library

x-backend: &backend
  build:
    args:
      RUBY_VERSION: 3.4.5
      DEBIAN_FRONTEND: noninteractive
    target: dev
  stdin_open: true
  tty: true
  volumes:
    - .:/app:cached
    - rails_cache:/app/tmp/cache
    - bundle:/usr/local/bundle
    - $HOME/.aws:/root/.aws
  environment:
    SIDEKIQ_REDIS_URL: redis://redis:6379/
    WEB_CONCURRENCY: ${WEB_CONCURRENCY:-0}
    HISTFILE: /app/log/.bash_history
    PSQL_HISTFILE: /app/log/.psql_history
    EDITOR: vim
  depends_on:
    - redis

services:
  runner:
    <<: *backend
    command: /bin/bash

  web:
    <<: *backend
    command: ["bundle", "exec", "rails", "s", "-b", "0.0.0.0"]
    ports:
      - "3001:3000"

  sidekiq:
    <<: *backend
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  redis:
    image: redis:6.2.4
    volumes:
      - redis:/data
    ports:
      - "6379"
    healthcheck:
      test: redis-cli ping
      interval: 1s
      timeout: 3s
      retries: 30

volumes:
  redis:
  bundle:
  rails_cache:

secrets:
  app-secrets:
    file: .env
